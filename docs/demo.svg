<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <style>
    @keyframes t1  { 0%,4%  { opacity:0 } 5%  { opacity:1 } }
    @keyframes t2  { 0%,9%  { opacity:0 } 10% { opacity:1 } }
    @keyframes t3  { 0%,18% { opacity:0 } 19% { opacity:1 } }
    @keyframes t4  { 0%,27% { opacity:0 } 28% { opacity:1 } }
    @keyframes t5  { 0%,36% { opacity:0 } 37% { opacity:1 } }
    @keyframes t6  { 0%,50% { opacity:0 } 51% { opacity:1 } }
    @keyframes t7  { 0%,62% { opacity:0 } 63% { opacity:1 } }
    @keyframes t8  { 0%,75% { opacity:0 } 76% { opacity:1 } }
    @keyframes t9  { 0%,88% { opacity:0 } 89% { opacity:1 } }
    @keyframes cur { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
    .term-bg { fill: #09090b; }
    .title-bar { fill: #18181b; }
    .dot-r { fill: #ef4444; }
    .dot-y { fill: #eab308; }
    .dot-g { fill: #22c55e; }
    .title-text { fill: #71717a; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 12px; }
    .prompt { fill: #3b82f6; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; font-weight: 600; }
    .cmd { fill: #e4e4e7; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .flag { fill: #a855f7; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .arg { fill: #22c55e; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .out { fill: #a1a1aa; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .out-g { fill: #22c55e; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .out-b { fill: #3b82f6; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .out-y { fill: #eab308; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .out-c { fill: #06b6d4; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .out-w { fill: #e4e4e7; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; font-weight: 600; }
    .out-m { fill: #71717a; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .out-d { fill: #71717a; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 11px; }
    .cursor { fill: #3b82f6; animation: cur 1s step-end infinite; }
    .g1 { opacity: 0; animation: t1 25s ease-in-out infinite; }
    .g2 { opacity: 0; animation: t2 25s ease-in-out infinite; }
    .g3 { opacity: 0; animation: t3 25s ease-in-out infinite; }
    .g4 { opacity: 0; animation: t4 25s ease-in-out infinite; }
    .g5 { opacity: 0; animation: t5 25s ease-in-out infinite; }
    .g6 { opacity: 0; animation: t6 25s ease-in-out infinite; }
    .g7 { opacity: 0; animation: t7 25s ease-in-out infinite; }
    .g8 { opacity: 0; animation: t8 25s ease-in-out infinite; }
    .g9 { opacity: 0; animation: t9 25s ease-in-out infinite; }
  </style>

  <!-- Terminal window -->
  <rect class="term-bg" x="0" y="0" width="800" height="520" rx="10"/>
  
  <!-- Title bar -->
  <rect class="title-bar" x="0" y="0" width="800" height="36" rx="10"/>
  <rect class="title-bar" x="0" y="20" width="800" height="16"/>
  <circle class="dot-r" cx="20" cy="18" r="6"/>
  <circle class="dot-y" cx="40" cy="18" r="6"/>
  <circle class="dot-g" cx="60" cy="18" r="6"/>
  <text class="title-text" x="400" y="22" text-anchor="middle">codesession-cli — demo</text>

  <!-- Line 1: cs run command -->
  <g class="g1">
    <text class="prompt" x="24" y="65">❯</text>
    <text class="cmd" x="44" y="65">cs run</text>
    <text class="arg" x="96" y="65">python agent.py</text>
  </g>

  <!-- Line 2: Session started -->
  <g class="g2">
    <text class="out-b" x="24" y="90">  ●</text>
    <text class="out-w" x="50" y="90">codesession</text>
    <text class="out" x="152" y="90">python agent.py</text>
  </g>

  <!-- Line 3: Proxy active -->
  <g class="g3">
    <text class="out-m" x="24" y="112">  ↳</text>
    <text class="out" x="50" y="112">proxy active</text>
    <text class="out-c" x="150" y="112">http://127.0.0.1:3739</text>
    <text class="out-m" x="340" y="112">(API calls auto-tracked)</text>
  </g>

  <!-- Line 4: Tracking -->
  <g class="g3">
    <text class="out-m" x="24" y="134">  ↳</text>
    <text class="out" x="50" y="134">tracking files, commits, AI usage</text>
  </g>

  <!-- Line 5: Agent running indicator -->
  <g class="g4">
    <text class="out-m" x="24" y="168">  [agent running...]</text>
  </g>

  <!-- Line 6: Done summary -->
  <g class="g5">
    <text class="out-g" x="24" y="202">  ✓ Done</text>
    <text class="out" x="90" y="202">python agent.py</text>
  </g>

  <!-- Line 7: Stats line -->
  <g class="g5">
    <text class="out" x="44" y="226">14m</text>
    <text class="out-m" x="76" y="226">•</text>
    <text class="out" x="90" y="226">8 files</text>
    <text class="out-m" x="150" y="226">•</text>
    <text class="out" x="164" y="226">2 commits</text>
    <text class="out-m" x="244" y="226">•</text>
    <text class="out-y" x="258" y="226">$1.43 AI cost</text>
  </g>

  <!-- Line 8: Top model -->
  <g class="g5">
    <text class="out-m" x="44" y="248">top model:</text>
    <text class="out-c" x="132" y="248">claude-sonnet-4</text>
    <text class="out-m" x="270" y="248">(38,000 tokens)</text>
  </g>

  <!-- Line 9: cs show prompt -->
  <g class="g6">
    <text class="prompt" x="24" y="286">❯</text>
    <text class="cmd" x="44" y="286">cs dashboard</text>
  </g>

  <!-- Line 10: Dashboard output -->
  <g class="g7">
    <text class="out-b" x="24" y="311">  codesession dashboard →</text>
    <text class="out-c" x="230" y="311">http://localhost:3737</text>
  </g>

  <!-- Line 11: cs today prompt -->
  <g class="g8">
    <text class="prompt" x="24" y="349">❯</text>
    <text class="cmd" x="44" y="349">cs today</text>
    <text class="flag" x="108" y="349">--ai</text>
  </g>

  <!-- Line 12: Today output -->
  <g class="g9">
    <text class="out-w" x="24" y="374">  Today — March 7, 2026</text>
    <text class="out" x="24" y="396">  3 projects tracked</text>
    <text class="out-m" x="24" y="416">  ├</text>
    <text class="out" x="40" y="416">codesession-cli</text>
    <text class="out-m" x="175" y="416">2 sessions, $3.82</text>
    <text class="out-m" x="24" y="436">  ├</text>
    <text class="out" x="40" y="436">portfolio</text>
    <text class="out-m" x="120" y="436">1 session, $0.45</text>
    <text class="out-m" x="24" y="456">  └</text>
    <text class="out" x="40" y="456">api-server</text>
    <text class="out-m" x="130" y="456">3 sessions, $7.12</text>
    <text class="out-y" x="24" y="480">  Total: $11.39 across 6 sessions</text>
    <text class="out-d" x="24" y="500">  AI context block copied to clipboard ✓</text>
  </g>
</svg>
